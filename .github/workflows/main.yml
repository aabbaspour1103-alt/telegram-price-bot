name: Crypto Price Bot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytz
          pip install bonbast

      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHANNEL_ID: "@CryptoBrew"
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          BONBAST_API_KEY: ${{ secrets.BONBAST_API_KEY }}
        run: |
          python bot.py
